# BRF Benchmark Registry Manifest
# https://github.com/zhanglizhuo/BRFRegistry

version: "1.5"
release_date: "2026-07-01"
total_datasets: 25

description: >
  Curated collection of group-aware educational benchmark datasets
  with standardized metadata, reproducibility scripts, and BRF
  (Benchmark Reliability Framework) audit results.
  Includes multiple grouping views for meta-analysis of how
  grouping granularity shapes BRF metrics (S, E, B, I, N, M).

datasets:
  - oulad
  - student_dropout
  - xapi_edu
  - entrance_exam
  - uci_student
  - higher_ed
  - mm_tba
  - tae
  - turkiye
  - assistments
  - mathe
  - colleges_aaup
  - colleges_usnews
  - college_scorecard
  - oli
  - student_depression
  - student_depression_prof
  - student_depression_degree
  - assistments_school
  - college_scorecard_region
  - college_scorecard_carnegie
  - college_scorecard_ownership
  - pisa2015
  - law_school
  - colleges_aaup_type

brf_results:
  reliable: 20
  void: 5
  fragile: 0

schema_version: "2.0.0"
